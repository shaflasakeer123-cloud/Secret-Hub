<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Smart To-Do List</title>
    <link rel="stylesheet" href="todo-styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <svg class="logo-icon" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect x="15" y="15" width="70" height="70" rx="10" fill="none" stroke="url(#logoGradient)" stroke-width="3"/>
                        <path d="M 30 50 L 45 65 L 70 35" stroke="url(#logoGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h1>TaskFlow</h1>
                </div>
                <div class="header-stats">
                    <div class="stat">
                        <span class="stat-label">Total Tasks</span>
                        <span class="stat-value" id="totalTasks">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Completed</span>
                        <span class="stat-value completed" id="completedTasks">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Pending</span>
                        <span class="stat-value pending" id="pendingTasks">0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-container">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task... (Press Enter or click Add)"
                        autocomplete="off"
                    >
                    <div class="input-options">
                        <select id="prioritySelect" class="priority-select">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                        <select id="categorySelect" class="category-select">
                            <option value="general">General</option>
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="shopping">Shopping</option>
                            <option value="health">Health</option>
                        </select>
                        <button class="btn-add" onclick="addTask()">Add Task</button>
                    </div>
                </div>
            </section>

            <!-- Filter and Sort Section -->
            <section class="controls-section">
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterTasks('all')">All</button>
                    <button class="filter-btn" onclick="filterTasks('active')">Active</button>
                    <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
                </div>

                <div class="sort-group">
                    <label for="sortSelect">Sort by:</label>
                    <select id="sortSelect" class="sort-select" onchange="sortTasks(this.value)">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="priority">Priority</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                    </select>
                </div>

                <button class="btn-danger" onclick="clearCompleted()">Clear Completed</button>
            </section>

            <!-- Tasks Grid -->
            <section class="tasks-section">
                <div id="tasksContainer" class="tasks-grid">
                    <!-- Tasks will be populated here -->
                </div>
                <div id="emptyState" class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#e5e7eb" stroke-width="2"/>
                        <path d="M 35 50 L 50 65 L 75 35" stroke="#e5e7eb" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <p>No tasks yet. Create one to get started! 🚀</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p>TaskFlow © 2026 | All tasks are saved automatically to your device</p>
                <div class="footer-actions">
                    <button class="btn-sm" onclick="exportTasks()">📥 Export Tasks</button>
                    <button class="btn-sm" onclick="resetAllTasks()">🔄 Reset All</button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="notification"></div>

    <script src="todo-app.js"></script>
</body>
</html>
